services:
  minio-ormt:
    image: minio/minio:latest
    container_name: minio-ormt
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Better security defaults
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
      MINIO_BROWSER: "on"
      MINIO_DOMAIN: ${MINIO_API_HOST_URL:-minio.local}
    # Command to start Minio server and expose console on port 9001
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.routers.minio-api.entrypoints=web"
      - "traefik.http.routers.minio-api.rule=Host(`${MINIO_API_HOST_URL}`)"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000" # Console routing (port 9001)
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST_URL}`)"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

    healthcheck:
      # Use curl to check the Minio health endpoint
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s # Allow time for Minio to initialize
    networks:
      - proxy

volumes:
  minio_data:
    # Define the volume for Minio data persistence

networks:
  proxy:
    external: true
