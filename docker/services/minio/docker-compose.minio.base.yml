services:
  minio-ormt:
    image: minio/minio:latest
    container_name: minio-ormt
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
      MINIO_BROWSER: "on"
      MINIO_DOMAIN: ${MINIO_API_HOST_URL:-minio.local}
      MINIO_API_HOST_URL: ${MINIO_API_HOST_URL:-minio.local}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

    labels:

      # Console routing (port 9001)
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST_URL}`)"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - proxy

volumes:
  minio_data:
    # Define the volume for MinIO data persistence

networks:
  proxy:
    external: true
