version: "3.9"
services:
  pva-database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${PVA_DATABASE_HOSTNAME}
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SQLSERVER_API_PASSWORD}
      SQLSERVER_API_PASSWORD: ${SQLSERVER_API_PASSWORD}
      SQLSERVER_API_DB: ${SQLSERVER_API_DB}
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_API_PASSWORD} -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s

volumes:
  sqlserver_data_pva_api:

networks:
  proxy:
    external: true
