version: "3.9"
services:
  pva-database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${PVA_DATABASE_HOSTNAME}
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SQLSERVER_API_PASSWORD}
      SQLSERVER_API_PASSWORD: ${SQLSERVER_API_PASSWORD}
      SQLSERVER_API_DB: ${SQLSERVER_API_DB}
    networks:
      - proxy
    volumes:
      - "sqlserver_data_pva_api:/var/opt/mssql"
    # command: /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 10 && /docker-entrypoint-initdb.d/init-db.sh"
    command: /opt/mssql/bin/sqlservr

volumes:
  sqlserver_data_pva_api:

networks:
  proxy:
    external: true
