version: "3.9"
services:
  pva-database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${PVA_DATABASE_HOSTNAME}
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_API_PASSWORD}
      SQLSERVER_DB: ${SQLSERVER_API_DB}
      MSSQL_PID: "Developer"
    volumes:
      - "sqlserver_data_pva_api:/var/opt/mssql"
    networks:
      - proxy

volumes:
  sqlserver_data_pva_api:

networks:
  proxy:
    external: true
