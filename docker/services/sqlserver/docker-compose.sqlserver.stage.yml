version: "3.9"
services:
  pva-database:
    ports:
      - 1431:1433 # expose port 1431 to host machine
    volumes:
      - ./env/init-db-stage.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_API_PASSWORD} -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
