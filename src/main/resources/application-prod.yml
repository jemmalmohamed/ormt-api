starter:
  database:
    reset: true
    seed: true
  minio:
    reset: true
    seed: true
  keycloak:
    reset: true
    seed: true
  faker:
    seed: false

# Added MinIO configuration for production

minio:
  endpoint: http://minio-ormt:9000
  access-key: minio
  secret-key: minio@ormt
  bucket: ormt
  allowed-origins: https://ormt-ms.org
 
spring:
  security:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:20MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:20MB}
  datasource:
    url: jdbc:postgresql://${spring.datasource.host}:${spring.datasource.port}/${spring.datasource.database}
    driver-class-name: org.postgresql.Driver
    host: ormt-database
    port: 5432
    database: ormt
    username: ormt
    password: ormt@database2024

  flyway:
    enabled: true
    clean-disabled: true  # Prevent accidental database cleanup in production
    baseline-on-migrate: true
    baseline-description: "Production Database State"
    locations: classpath:db/migration
    validate-on-migrate: true
  
  # Add this line to fix the immediate issue:
    migration-strategy: migrate
  # Or alternatively:
  # ignore-migration-patterns: '*:pending'
  
    repair-on-validate: false
    out-of-order: false
    ignore-missing-migrations: false
    ignore-future-migrations: false

keycloak:
  # host: ormt-kc:8080
  host: ormt-kc:8080
  auth-server-url: https://users.ormt-ms.org
  admin:
    realm: master
    client: admin-cli
    username: ormt
    password: ormt
  realm: ormt # this is the realm name
  secret: "SSnam21521xFoFQAqi5TA68jKV3nBOyl"
  clients:
    backend:
      id: ormt-api # this is the client id (name )of the api
      name: ormt api
      root-url: https://ormt-api.ormt-ms.org
      valid-redirect-urls: https//${keycloak.clients.backend.root-url}/*
      web-origins: "https://ormt-api.ormt-ms.org"
      authorization: true
    frontend:
      id: ormt-web # this is the client id (name) of the frontend
      name: ormt ms
      root-url: https://ormt-ms.org
      web-origins: "https://ormt-ms.org"
      authorization: false

logging:
  level:
    org.hibernate.SQL: ERROR
    org.hibernate.tool.hbm2ddl: ERROR
