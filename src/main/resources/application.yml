spring:
  profiles:
    active: "@spring.profiles.active@"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
  jpa:
    hibernate:
      ddl-auto: validate
      format_sql: true
    database: postgresql
    show-sql: false
  sql:
    init:
      mode: never
  main:
    web-application-type: servlet
  output:
    ansi:
      enabled: ALWAYS
  servlet:
    multipart:
      enabled: true
      # Allow up to 10MB per file and per request (can be overridden per profile or via env vars)
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}
 
flyway:
  enabled: true
  baseline-on-migrate: true
  baseline-description: Initial database state
  user: ${spring.datasource.username}
  password: ${spring.datasource.password}

data:
  external:
    data_path: ./data

jwt:
  auth:
    converter:
      principle-attribute: preferred_username
 
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html 
    filter: false
 
# logging:
#   level:
#     com.zaxxer.hikari: DEBUG

# File security settings
file:
  token:
    secret: ${FILE_TOKEN_SECRET:OrmtFileSecurityTokenSecretKey}
    validitySeconds: ${FILE_TOKEN_VALIDITY:300}  # 5 minutes by default
 
    